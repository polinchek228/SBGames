[package]
name = "sbgames-launcher"
version = "1.0.0"
description = "SB Games Minecraft Launcher"
authors = ["SB Games Team"]
license = ""
repository = ""
edition = "2021"

[lib]
name = "sbgames_launcher_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
panic = "abort"
codegen-units = 1
lto = "fat"
opt-level = 3
strip = "symbols"
overflow-checks = false
debug = false
debug-assertions = false
incremental = false
