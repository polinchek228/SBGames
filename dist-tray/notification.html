<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: rgba(22, 22, 30, 0.92);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .card {
      position: absolute;
      right: 0; bottom: 0;
      width: 370px;
      margin: 12px;
      border-radius: 10px;
      background: rgba(22, 22, 30, 0.92);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow:
        0 4px 6px rgba(0, 0, 0, 0.3),
        0 12px 32px rgba(0, 0, 0, 0.5),
        0 0 0 0.5px rgba(255, 255, 255, 0.04);
      overflow: hidden;
      opacity: 0;
      transform: translateX(24px);
      animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .card.hiding {
      animation: slideOut 0.3s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }

    .top-line {
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--accent, #8b5cf6) 30%,
        var(--accent, #8b5cf6) 70%,
        transparent 100%
      );
      opacity: 0.7;
    }

    .content {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px 12px;
    }

    .icon-box {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .icon-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent-color), transparent 70%);
      opacity: 0.15;
    }

    .icon-box::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9px;
      border: 1px solid var(--accent-color);
      opacity: 0.2;
    }

    .icon-box svg {
      width: 18px;
      height: 18px;
      position: relative;
      z-index: 1;
    }

    .text-block {
      flex: 1;
      min-width: 0;
      padding-top: 1px;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-color, #a78bfa);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .heading {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      margin-top: 3px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .desc {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .timer-bar {
      height: 2px;
      background: rgba(255, 255, 255, 0.04);
    }

    .timer-fill {
      height: 100%;
      background: var(--accent-color, #8b5cf6);
      opacity: 0.5;
      width: 100%;
      transform-origin: left;
      animation: countdown 5s linear forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(24px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(24px) scale(0.96); }
    }

    @keyframes countdown {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="top-line"></div>
    <div class="content">
      <div class="icon-box" id="iconBox">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="iconSvg">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4"/>
          <path d="M12 8h.01"/>
        </svg>
      </div>
      <div class="text-block">
        <div class="label" id="label">SB Games</div>
        <div class="heading" id="heading"></div>
        <div class="desc" id="desc"></div>
      </div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  </div>

  <script>
    const TYPES = {
      friend: {
        label: 'Друг',
        color: '#60a5fa',
        paths: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'
      },
      balance: {
        label: 'Баланс',
        color: '#34d399',
        paths: '<circle cx="12" cy="12" r="8"/><path d="M12 8v8"/><path d="M8.5 10.5h7"/><path d="M8.5 13.5h7"/>'
      },
      ticket: {
        label: 'Поддержка',
        color: '#fbbf24',
        paths: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'
      },
      system: {
        label: 'SB Games',
        color: '#a78bfa',
        paths: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>'
      },
      success: {
        label: 'Готово',
        color: '#34d399',
        paths: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
      },
    };

    function render(title, body, type) {
      const meta = TYPES[type] || TYPES.system;
      const root = document.documentElement;
      root.style.setProperty('--accent-color', meta.color);

      document.getElementById('label').textContent = meta.label;
      document.getElementById('label').style.color = meta.color;
      document.getElementById('heading').textContent = title;
      document.getElementById('desc').textContent = body || '';
      document.getElementById('desc').style.display = body ? '' : 'none';

      const svg = document.getElementById('iconSvg');
      svg.setAttribute('stroke', meta.color);
      svg.innerHTML = meta.paths;

      // Перезапуск анимации
      const card = document.getElementById('card');
      card.classList.remove('hiding');
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = '';

      const fill = document.getElementById('timerFill');
      fill.style.animation = 'none';
      fill.offsetHeight;
      fill.style.animation = '';
    }

    // Рендер из URL params
    const p = new URLSearchParams(window.location.search);
    if (p.get('title')) {
      render(p.get('title'), p.get('body'), p.get('type'));
    }
  </script>
</body>
</html>
