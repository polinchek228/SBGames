# Деплой через GitLab Runner, зарегистрированный с тегом "deploy" прямо на
# прод-сервере (поэтому cp локально, без SSH).
#
# ВНИМАНИЕ: канонический серверный код — server_index.js (с авто-детектом
# latest по файлам в updates/ + чтением .sig). server/index.js — УСТАРЕВШИЙ
# (LATEST_VERSION захардкожен в "1.0.0", .sig не читается), его деплой
# ЛОМАЕТ авто-апдейтер. Поэтому деплоим только server_index.js.
stages:
  - deploy

deploy:
  stage: deploy
  tags:
    - deploy
  when: manual
  script:
    # Канонический серверный код (авто-детект версий + подписи)
    - cp server_index.js /opt/sbgames-auth/server_index.js
    - cp server/package.json /opt/sbgames-auth/package.json
    - cp server/package-lock.json /opt/sbgames-auth/package-lock.json

    # Доп. модули (опционально — могут отсутствовать)
    - 'cp server-files/modpack.js /opt/sbgames-auth/modpack.js || true'
    - 'cp server-files/verify.js /opt/sbgames-auth/verify.js || true'

    # Бинарники апдейта, если сложены в репо (обычно льются через CI-артефакты)
    - mkdir -p /opt/sbgames-auth/updates
    - 'cp -r server/updates/. /opt/sbgames-auth/updates/ || true'

    # Зависимости
    - cd /opt/sbgames-auth && npm install --production

    # Билдим фронтенд сайта (отдельный package.json в website/)
    - cd $CI_PROJECT_DIR/website && npm install && npm run build
    - mkdir -p /opt/sbgames-auth/website-dist
    - cp -r $CI_PROJECT_DIR/website/dist/. /opt/sbgames-auth/website-dist/

    # Рестарт
    - sudo -u mnntn pm2 restart sbgames-auth
    - sudo -u mnntn pm2 list
    - echo "=== Deploy done ==="
