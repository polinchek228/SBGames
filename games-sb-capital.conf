server {
    server_name games.sb-capital.group;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/games.sb-capital.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/games.sb-capital.group/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # ── API-маршруты, проксируемые в Express ДО статического catch-all ──────
    # ВАЖНО: эти location'ы должны стоять ПЕРЕД `location /` (статика/SPA),
    # иначе не-GET методы (PUT/POST/DELETE) попадут в try_files и получат 405
    # от nginx (нельзя POSTить в статический файл).
    # Express сам отдаёт JSON для API и fallback на index.html для SPA-роутов.

    # Affiliate / Referral API (stats/code/payout/register) — все методы.
    location /affiliate/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Публичный invite-редирект (/invite/CODE) — Express.
    location /invite/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Картинки товаров магазина (админ загружает в /opt/sbgames/shop-images/).
    location /shop-images/ {
        alias /opt/sbgames/shop-images/;
        add_header Cache-Control "public, max-age=604800";
        add_header Access-Control-Allow-Origin "*";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /backgrounds/ {
        alias /opt/sbgames/backgrounds/;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }
}

server {
    if ($host = games.sb-capital.group) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name games.sb-capital.group;
    return 404;
}
