name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'content/forum/**'
      - 'scripts/build-forum.cjs'
      - 'scripts/ai-generate.cjs'
      - 'scripts/ai-cron.sh'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build
        run: cd website && npm install && npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass >/dev/null 2>&1

      - name: Upload to server
        run: |
          # Ensure website dir exists (sudo needs password — pipe it)
          sshpass -p "${{ secrets.SERVER_PASS }}" \
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo '${{ secrets.SERVER_PASS }}' | sudo -S mkdir -p /var/www/sbgames && echo '${{ secrets.SERVER_PASS }}' | sudo -S chown -R \$USER:\$USER /var/www/sbgames"
          sshpass -p "${{ secrets.SERVER_PASS }}" \
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -r website/dist/. \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/sbgames/
          echo "✅ Website files uploaded"

      - name: Deploy nginx config
        run: |
          # Write nginx config to local file
          cat > /tmp/nginx-games.conf << 'NGINX'
          server {
              server_name games.sb-capital.group;

              listen 443 ssl;
              ssl_certificate /etc/letsencrypt/live/games.sb-capital.group/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/games.sb-capital.group/privkey.pem;
              include /etc/letsencrypt/options-ssl-nginx.conf;
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

              client_max_body_size 20M;

              # Static assets from disk
              location /backgrounds/ {
                  alias /opt/sbgames/backgrounds/;
                  add_header Cache-Control "public, max-age=86400";
                  add_header Access-Control-Allow-Origin "*";
              }
              location /frames/ {
                  alias /opt/sbgames/frames/;
                  add_header Cache-Control "public, max-age=86400";
                  add_header Access-Control-Allow-Origin "*";
              }
              location /icons/ {
                  alias /opt/sbgames/icons/;
                  add_header Cache-Control "public, max-age=86400";
                  add_header Access-Control-Allow-Origin "*";
              }

              # API routes → Express
              location /auth/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /api/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /payments/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /admin/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /support/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /update/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /downloads/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /servers/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /online {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /health {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /news {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /skin-proxy/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              location /user/ {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # WebSocket
              location /ws {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 86400;
              }

              # Website static files (catch-all)
              location / {
                  root /var/www/sbgames;
                  try_files $uri $uri/ /index.html;
              }
          }

          server {
              if ($host = games.sb-capital.group) {
                  return 301 https://$host$request_uri;
              }
              listen 80;
              server_name games.sb-capital.group;
              return 404;
          }
          NGINX

          # Upload config, install, test, reload
          sshpass -p "${{ secrets.SERVER_PASS }}" \
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            /tmp/nginx-games.conf \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/games-sb-capital.conf

          sshpass -p "${{ secrets.SERVER_PASS }}" \
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo '${{ secrets.SERVER_PASS }}' | sudo -S cp /tmp/games-sb-capital.conf /etc/nginx/sites-available/games.sb-capital.group 2>/dev/null && echo '${{ secrets.SERVER_PASS }}' | sudo -S nginx -t 2>&1 && echo '${{ secrets.SERVER_PASS }}' | sudo -S systemctl reload nginx 2>&1 && echo '✅ Nginx reloaded'"
