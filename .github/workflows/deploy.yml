name: Build & Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'server/**'
      - 'server_index.js'
      - 'package.json'
      - 'vite.config.*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для релиза (например 1.1.0). Если пусто — берёт из tauri.conf.json'
        required: false

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  REMOTE_DIR: /opt/sbgames-auth

jobs:
  build-and-deploy:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-22.04
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build · ${{ matrix.name }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libglib2.0-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        run: npm install

      - name: Verify signing key is set
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set! Add it in Settings → Secrets"
            exit 1
          fi
          echo "✅ Signing key available (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          fi
          echo "VER=$VER" >> $GITHUB_ENV
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Building version: $VER"

      - name: Apply version to build files
        shell: bash
        run: |
          python3 - << 'EOF'
          import json, re, os
          ver = os.environ['VER']

          with open('src-tauri/tauri.conf.json', 'r') as f: d = json.load(f)
          d['version'] = ver
          with open('src-tauri/tauri.conf.json', 'w') as f: json.dump(d, f, indent=2)

          with open('src-tauri/Cargo.toml', 'r') as f: c = f.read()
          c = re.sub(r'^version = "[^"]*"', f'version = "{ver}"', c, count=1, flags=re.MULTILINE)
          with open('src-tauri/Cargo.toml', 'w') as f: f.write(c)

          with open('package.json', 'r') as f: p = json.load(f)
          p['version'] = ver
          with open('package.json', 'w') as f: json.dump(p, f, indent=2)

          print(f'Version set to: {ver}')
          EOF

      - name: Verify signing key is set
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          echo "Key length: ${#TAURI_SIGNING_PRIVATE_KEY} chars"
          echo "Key prefix: ${TAURI_SIGNING_PRIVATE_KEY:0:20}..."
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is EMPTY!"
            exit 1
          fi

      - name: Build Tauri app
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Upload Windows updater
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: updater-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: warn

      - name: Upload macOS updater
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: updater-macos
          path: |
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

      - name: Upload Linux updater
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: updater-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: warn

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload macOS installer
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Linux installer
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    name: Deploy to server

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            server_index.js
            server/index.js
          sparse-checkout-cone-mode: false

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install sshpass
        run: sudo apt-get install -y sshpass >/dev/null 2>&1

      - name: Clean old artifacts on server
        run: |
          sshpass -p "${{ secrets.SERVER_PASS }}" \
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "mkdir -p /opt/sbgames-auth/updates && find /opt/sbgames-auth/updates -type f ! -name '*.json' -delete && echo 'Cleaned'"

      - name: Deploy updater artifacts to server
        run: |
          find artifacts -type f -print0 | while IFS= read -r -d '' f; do
            fname=$(basename "$f")
            case "$fname" in
              *.exe|*.msi|*.dmg|*.AppImage|*.deb|*.zip|*.sig|*.gz)
                echo "Uploading: $fname"
                sshpass -p "${{ secrets.SERVER_PASS }}" \
                  scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                  "$f" \
                  ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/opt/sbgames-auth/updates/ || true
                ;;
            esac
          done

      - name: Deploy server code
        run: |
          sshpass -p "${{ secrets.SERVER_PASS }}" \
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            server_index.js \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/opt/sbgames-auth/

      - name: Install deps and restart server
        run: |
          sshpass -p "${{ secrets.SERVER_PASS }}" \
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "cd /opt/sbgames-auth && npm install --production 2>/dev/null && pm2 restart sbgames-auth && echo '✅ Deployed and restarted'"
