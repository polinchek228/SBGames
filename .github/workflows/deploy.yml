name: Build & Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'server/**'
      - 'server_index.js'
      - 'package.json'
      - 'vite.config.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для релиза (например 1.1.0). Если пусто — берёт из tauri.conf.json'
        required: false

env:
  SERVER: root@94.26.83.31
  REMOTE_DIR: /opt/sbgames-auth

jobs:
  build-and-deploy:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-22.04
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build · ${{ matrix.name }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libglib2.0-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        run: npm install

      - name: Verify signing key is set
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set! Add it in Settings → Secrets"
            exit 1
          fi
          echo "✅ Signing key available (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"

      # ── Version bump (опционально) ──
      - name: Bump version
        if: github.event.inputs.version != ''
        shell: bash
        run: |
          VER="${{ github.event.inputs.version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VER\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VER\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VER\"/" package.json
          sed -i "s/const LATEST_VERSION = \"[^\"]*\"/const LATEST_VERSION = \"$VER\"/" server_index.js
          sed -i "s/const LATEST_VERSION = \"[^\"]*\"/const LATEST_VERSION = \"$VER\"/" server/index.js

      - name: Verify signing key is set
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          echo "Key length: ${#TAURI_SIGNING_PRIVATE_KEY} chars"
          echo "Key prefix: ${TAURI_SIGNING_PRIVATE_KEY:0:20}..."
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is EMPTY!"
            exit 1
          fi

      # ── Build с подписью ──
      - name: Build Tauri app
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      # ── Upload updater artifacts (не NSIS .exe, а .nsis.zip + .sig) ──
      - name: Upload Windows updater
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: updater-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: warn

      - name: Upload macOS updater
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: updater-macos
          path: |
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

      - name: Upload Linux updater
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: updater-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
          if-no-files-found: warn

      # ── Upload regular installers (для первичной установки) ──
      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload macOS installer
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Linux installer
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════════════════
  # Деплой на сервер (только на Windows билде, т.к. NSIS — основная платформа)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    name: Deploy to server

    steps:
      - name: Download all updater artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: updater-*
          merge-multiple: true

      - name: Download server files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            server_index.js
            server/index.js
          sparse-checkout-cone-mode: false

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          source: "artifacts/*"
          target: "${{ env.REMOTE_DIR }}/updates/"
          strip_components: 1
          overwrite: true

      - name: Deploy server code
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          source: "server_index.js"
          target: "${{ env.REMOTE_DIR }}/"
          overwrite: true

      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          script: |
            cd /opt/sbgames-auth
            pm2 restart sbgames-auth
            echo "✅ Deployed and restarted"
