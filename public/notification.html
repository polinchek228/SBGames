<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Единственный фоновый слой — карточка занимает всё окно целиком.
       Никаких внешних margin: иначе на Windows прозрачная зона по краям
       рендерится непрозрачной и выглядит как "второй фон". Окно создаётся
       под точный размер карточки, тень рисуется наружу через box-shadow. */
    .card {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      background: #0c0c12;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 10px 40px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .top-line {
      height: 2px;
      flex-shrink: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--accent, #3b82f6) 25%,
        var(--accent, #3b82f6) 75%,
        transparent 100%
      );
      opacity: 0.85;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px 0;
      flex-shrink: 0;
    }

    .brand {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.28);
    }

    .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
    }

    .type-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent, #60a5fa);
      opacity: 0.9;
    }

    .content {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 8px 14px 12px;
      flex: 1;
      min-height: 0;
    }

    .icon-box {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .icon-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: var(--accent, #3b82f6);
      opacity: 0.12;
    }

    .icon-box svg {
      width: 16px;
      height: 16px;
      position: relative;
      z-index: 1;
    }

    .text-block {
      flex: 1;
      min-width: 0;
    }

    .heading {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.95);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .desc {
      font-size: 11.5px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 3px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .timer-bar {
      height: 2px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.05);
    }

    .timer-fill {
      height: 100%;
      background: var(--accent, #3b82f6);
      opacity: 0.4;
      width: 100%;
      transform-origin: left;
    }

    .timer-fill.run {
      animation: countdown var(--duration, 5s) linear forwards;
    }

    @keyframes countdown {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="top-line"></div>
    <div class="header">
      <span class="brand">SBGames</span>
      <span class="dot"></span>
      <span class="type-label" id="typeLabel">Уведомление</span>
    </div>
    <div class="content">
      <div class="icon-box" id="iconBox">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="iconSvg">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4"/>
          <path d="M12 8h.01"/>
        </svg>
      </div>
      <div class="text-block">
        <div class="heading" id="heading"></div>
        <div class="desc" id="desc"></div>
      </div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  </div>

  <script>
    const TYPES = {
      friend:  { label: 'Игроки',      color: '#60a5fa', paths: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
      balance: { label: 'Баланс',      color: '#34d399', paths: '<circle cx="12" cy="12" r="8"/><path d="M12 8v8"/><path d="M8.5 10.5h7"/><path d="M8.5 13.5h7"/>' },
      ticket:  { label: 'Поддержка',   color: '#f59e0b', paths: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' },
      system:  { label: 'Система',     color: '#60a5fa', paths: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>' },
      success: { label: 'Готово',      color: '#34d399', paths: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' },
      dm:      { label: 'Сообщения',   color: '#38bdf8', paths: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/>' },
      market:  { label: 'Магазин',     color: '#4ade80', paths: '<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>' },
      group:   { label: 'Ошибка',      color: '#f87171', paths: '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' },
      comment: { label: 'Комментарии', color: '#fb923c', paths: '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>' },
    };

    function render(title, body, type, durationMs) {
      const meta = TYPES[type] || TYPES.system;
      document.documentElement.style.setProperty('--accent', meta.color);

      document.getElementById('typeLabel').textContent = meta.label;
      document.getElementById('heading').textContent = title || '';
      const desc = document.getElementById('desc');
      desc.textContent = body || '';
      desc.style.display = body ? '' : 'none';

      const svg = document.getElementById('iconSvg');
      svg.setAttribute('stroke', meta.color);
      svg.innerHTML = meta.paths;

      // Перезапуск анимации таймера (длительность синхронизирована с auto-hide).
      const dur = Math.max(1500, parseInt(durationMs, 10) || 5000);
      document.documentElement.style.setProperty('--duration', dur + 'ms');
      const fill = document.getElementById('timerFill');
      fill.classList.remove('run');
      void fill.offsetWidth; // force reflow → перезапуск анимации
      fill.classList.add('run');

      // Плавное появление карточки.
      const card = document.getElementById('card');
      requestAnimationFrame(() => card.classList.add('show'));
    }

    function applyFromQuery() {
      const p = new URLSearchParams(window.location.search);
      if (p.get('title') !== null) {
        render(p.get('title'), p.get('body'), p.get('type'), p.get('duration'));
      }
    }

    // Первичный рендер из query.
    applyFromQuery();

    // Повторный показ без перезагрузки страницы: фронт шлёт событие 'sbg-notif'
    // с теми же полями. Это убирает мигание от navigate()/reload.
    window.addEventListener('sbg-notif', (e) => {
      const d = e.detail || {};
      const card = document.getElementById('card');
      card.classList.remove('show');
      requestAnimationFrame(() => render(d.title, d.body, d.type, d.duration));
    });
  </script>
</body>
</html>
